<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JobPilot Companion</title>
  <style>
    body {
      width: 350px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #ffffff;
      color: #0f172a;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .header img {
      width: 24px;
      height: 24px;
    }
    h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 600;
    }
    p {
      font-size: 14px;
      color: #334155;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 10px 14px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      color: #64748b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div style="width:24px;height:24px;background:#2563eb;border-radius:6px;"></div>
    <h1>JobPilot Companion</h1>
  </div>
  
  <div id="content">
    <p>We've detected a job posting on this page. Do you want to save it to your Career OS?</p>
    <button id="save-job-btn">Save to JobPilot</button>
  </div>
  
  <div class="status" id="status-msg"></div>

  <script src="popup.js"></script>
</body>
</html>
